version: 2.1
workflows:
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
      - deploy:
          requires:
            - build
          filters:
            tags:
              only: /[0-9]+(\.[0-9]+)*/
            branches:
              ignore: /.*/
jobs:
  build:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: install python versions via pyenv
          command: |
            pyenv install --skip-existing 3.10 3.11 3.12 3.13
            pyenv local 3.10 3.11 3.12 3.13
      - restore_cache:
          key: v1-dependecy-cache-{{ checksum "pyproject.toml" }}-{{ checksum "Makefile" }}
      - run:
          name: install python dependencies
          command: |
            make dev
      - save_cache:
          paths:
            - "~/.cache/pypoetry"
          key: v1-dependecy-cache-{{ checksum "pyproject.toml" }}-{{ checksum "Makefile" }}
      - run:
          name: run tests
          command: |
            make test
            poetry run codecov
      - store_artifacts:
          path: htmlcov/
  deploy:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - restore_cache:
          key: v1-dependecy-cache-{{ checksum "pyproject.toml" }}-{{ checksum "Makefile" }}
      - run:
          name: install python dependencies
          command: |
            make dev
      - save_cache:
          paths:
            - "~/.cache/pypoetry"
          key: v1-dependecy-cache-{{ checksum "pyproject.toml" }}-{{ checksum "Makefile" }}
      - run:
          name: verify git tag vs. version
          command: |
            poetry version --short | grep -qx "$CIRCLE_TAG" || (echo "Git tag $CIRCLE_TAG does not match version $(poetry version --short)" && exit 1)
      - run:
          name: create packages
          command: |
            make package
      - run:
          name: upload to pypi
          command: |
            poetry publish -u $PYPI_USERNAME -p $PYPI_PASSWORD